[pytest]
# Root config so `pytest` from the repo root registers markers and finds tests.
# `cd python && pytest` still uses python/pytest.ini (same markers).
testpaths = python/tests
markers =
    gpu: needs CUDA and ML deps (whisper/chatterbox)
    integration: needs host model weights, Eve voice WAVs, or network download
filterwarnings =
    ignore::DeprecationWarning
